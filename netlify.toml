[build]
  publish = "public"
  functions = "netlify/functions"
  command = ""

# Send the frontend's relative /submit call to the serverless function.
[[redirects]]
  from = "/submit"
  to = "/.netlify/functions/submit"
  status = 200

[functions]
  # Preserve the node_modules layout so PDFKit can find its font (.afm) files.
  node_bundler = "nft"
  included_files = [
    "node_modules/pdfkit/js/data/**",
    "public/images/logo.png"
  ]
